services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compliance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compliance_dev}
      POSTGRES_DB: ${POSTGRES_DB:-compliance_mapping}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance_dev}@db:5432/${POSTGRES_DB:-compliance_mapping}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-compliance}:${POSTGRES_PASSWORD:-compliance_dev}@db:5432/${POSTGRES_DB:-compliance_mapping}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-rule_based}
      WATSONX_API_KEY: ${WATSONX_API_KEY:-}
      WATSONX_URL: ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_MODEL: ${WATSONX_MODEL:-ibm/granite-3-8b-instruct}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./static:/app/static

volumes:
  pgdata:
